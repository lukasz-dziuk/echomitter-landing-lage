<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echomitter - Warden Invite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #020617; color: #e2e8f0; }
  </style>
</head>
<body class="min-h-screen">
  <main class="mx-auto max-w-xl px-6 py-10">
    <h1 class="text-3xl font-bold text-white">You were invited as a warden</h1>
    <p class="mt-3 text-slate-300">
      Open this invite in the Echomitter app to review and accept the request.
    </p>

    <div class="mt-8 rounded-xl border border-slate-700 bg-slate-900 p-5">
      <p class="text-sm text-slate-400">Quick open on this device</p>
      <a id="openAppLink" href="#" class="mt-3 inline-flex rounded-lg bg-red-500 px-4 py-2 font-semibold text-white hover:bg-red-600">
        Open in app
      </a>
      <p class="mt-2 text-xs text-slate-500">If app is not installed, install it first and open this link again.</p>
    </div>

    <div class="mt-6 rounded-xl border border-slate-700 bg-slate-900 p-5">
      <p class="text-sm text-slate-400">Open on your phone with QR</p>
      <img id="qrImage" class="mt-3 h-56 w-56 rounded-lg bg-white p-2" alt="Invite QR" />
      <p class="mt-2 break-all text-xs text-slate-500" id="deeplinkText"></p>
    </div>

    <div class="mt-6 rounded-xl border border-slate-700 bg-slate-900 p-5">
      <p class="text-sm text-slate-400">Manual fallback</p>
      <button id="copyLink" class="mt-3 rounded-lg border border-slate-600 px-4 py-2 text-sm text-slate-200 hover:bg-slate-800">
        Copy app link
      </button>
      <p id="copyStatus" class="mt-2 text-xs text-slate-500"></p>
    </div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('t');
      const deepLink = token
        ? `echomitter://warden/invite?t=${encodeURIComponent(token)}`
        : 'echomitter://warden/invite';

      const openLink = document.getElementById('openAppLink');
      const qrImage = document.getElementById('qrImage');
      const deepLinkText = document.getElementById('deeplinkText');
      const copyButton = document.getElementById('copyLink');
      const copyStatus = document.getElementById('copyStatus');

      openLink.setAttribute('href', deepLink);
      deepLinkText.textContent = deepLink;

      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=${encodeURIComponent(deepLink)}`;
      qrImage.setAttribute('src', qrUrl);

      copyButton.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(deepLink);
          copyStatus.textContent = 'Copied.';
        } catch {
          copyStatus.textContent = 'Copy failed. Please copy from the text above.';
        }
      });
    })();
  </script>
</body>
</html>
